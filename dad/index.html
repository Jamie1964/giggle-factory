<!DOCTYPE html>
<!-- G-F.com/dad/index.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad Jokes Central | Giggle Factory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: skyblue;
            color: #000000;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 10px 0 20px 0;
        }

        header img {
            max-width: 350px;
            height: auto;
        }

        h1, p.subtitle {
            text-align: center;
        }

        .subtitle {
            font-size: 1.1rem;
            margin-top: -10px;
            margin-bottom: 30px;
        }

        .category-grid {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .category-card {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            color: #000000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .category-card:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }

        .category-card h2 {
            margin-top: 0;
            font-size: 1.3rem;
        }

        .category-card p {
            margin-bottom: 0;
            font-size: 0.95rem;
            color: #333333;
        }
    </style>
</head>
<body>

    <header>
        <img src="giggle-factory.com/images/giggle-factory-logo.png" alt="Giggle Factory Logo">
    </header>

    <main>
        <h1>Dad Jokes Central</h1>
        <p class="subtitle">Guaranteed to make you groan and laugh!</p>

        <div class="category-grid">
            <a href="/dad/animals/" class="category-card">
                <h2>Animal Jokes</h2>
                <p>The punniest animal jokes in the barnyard.</p>
            </a>
            <a href="/dad/food-and-drink/" class="category-card">
                <h2>Food & Drink Jokes</h2>
                <p>Deliciously cheesy humor and food puns.</p>
            </a>
            <a href="/dad/puns/" class="category-card">
                <h2>Puns & Wordplay</h2>
                <p>Clever wordplay to confuse and amuse.</p>
            </a>
            <a href="/dad/jobs/" class="category-card">
                <h2>Work & Office Jokes</h2>
                <p>Watercooler humor for the workplace.</p>
            </a>
        </div>
    </main>

</body>
</html>
